# Leave this empty in-repo so tests and deployments must opt into a workspace
# explicitly unless they really want one baked into local config.
default_workspace = ""

# Basenames are matched after exec attribution, so wrappers can preserve the
# agent identity while still delegating to a real shell binary underneath.
binary_seeds = [
  "claude",
  "claude-code",
  "gemini",
  "gemini-cli",
  "aider",
  "codex"
]

env_hints = ["ANTHROPIC_API_KEY", "OPENAI_API_KEY", "GEMINI_API_KEY", "DEEPSEEK_API_KEY"]
argv_hints = ["--model", "--api-key", "agent-mode"]
llm_endpoints = [
  "api.anthropic.com",
  "api.openai.com",
  "generativelanguage.googleapis.com",
  "api.deepseek.com"
]

shell_allowlist = []
sensitive_allowlist = []
# Runtime scratch locations like `/dev/shm` are appended in code; this file is
# for user-owned policy rather than hard-coded operational defaults.
delete_allowlist = [
  "/run/**"
]
