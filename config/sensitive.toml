# This list stays intentionally small and high-signal so detector behavior
# remains explainable in tests and local demos.
[[rule]]
glob = "/etc/shadow"
severity = "high"

[[rule]]
glob = "/etc/sudoers"
severity = "high"

[[rule]]
glob = "/etc/sudoers.d/**"
severity = "high"

[[rule]]
glob = "/root/**"
severity = "high"

[[rule]]
glob = "/home/*/.ssh/id_*"
severity = "high"

[[rule]]
glob = "/home/*/.aws/credentials"
severity = "high"

[[rule]]
glob = "/home/*/.config/gcloud/credentials*"
severity = "high"

[[rule]]
glob = "/home/*/.netrc"
severity = "high"

[[rule]]
glob = "/home/*/.bash_history"
severity = "medium"

[[rule]]
glob = "/home/*/.zsh_history"
severity = "medium"

# `/etc/passwd` is low severity because reads are common, but it still helps
# exercise the full sensitive-path pipeline end to end.
[[rule]]
glob = "/etc/passwd"
severity = "low"
